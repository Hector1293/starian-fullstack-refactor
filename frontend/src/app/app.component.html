<div class="todo-page">
  <h1>{{ title }}</h1>

  <app-task-form
    [resetKey]="taskFormResetKey"
    (createTask)="addTodo($event)"
    />

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <div class="todo-section">
      <h2>Tarefas</h2>

      <app-task-list
        [tasks]="todos"
        (removeTask)="removeTodo($event)"
        (toggleTask)="toggleCompleted($event)"
        />
    </div>
  </div>

  <router-outlet />

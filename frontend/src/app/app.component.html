<div class="todo-page">
  <h1>{{ title }}</h1>

  <div class="todo-form">
    <input
      type="text"
      [(ngModel)]="newTodo.title"
      placeholder="Digite uma nova tarefa"
      class="todo-input"
      />
      <button
        (click)="addTodo()"
        class="add-button"
        >
        Adicionar
      </button>
    </div>

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <div class="todo-section">
      <h2>Tarefas</h2>

      @if (todos.length === 0) {
        <div class="empty-message">
          Nenhuma tarefa encontrada.
        </div>
      }

      <ul class="todo-list">
        @for (todo of todos; track todo) {
          <li
            class="todo-item"
            >
            <label class="todo-content">
              <input
                type="checkbox"
                class="todo-checkbox"
                [checked]="todo.completed"
                (click)="toggleCompleted(todo, $event)"
                />
              <span class="todo-title" [class.todo-title--completed]="todo.completed">
                {{ todo.title }}
              </span>
            </label>
            <button
              (click)="removeTodo(todo.id)"
              class="remove-button"
              >
              Remover
            </button>
          </li>
        }
      </ul>
    </div>
  </div>

  <router-outlet />
